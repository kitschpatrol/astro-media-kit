packages:
  - .
  - playground
  - playground-starlight

ignoreWorkspaceRootCheck: true

overrides:
  '@kitschpatrol/prettier-plugin-astro': '0.14.1-fork.2'

onlyBuiltDependencies:
  - esbuild
  - puppeteer
  - sharp
  - unrs-resolver
  - ws

publicHoistPattern:
  - '@kitschpatrol/repo-config'
  - '@kitschpatrol/typescript-config'
  - 'case-police'
  - '*cspell*'
  - '*eslint*'
  - '*knip*'
  - '*mdat*'
  - '*prettier*'
  - '*remark*'
  - '*stylelint*'
